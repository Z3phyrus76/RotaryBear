<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dearest</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=IM+Fell+English:ital@0;1&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background:
  radial-gradient(circle at top, rgba(255, 235, 220, 0.9), transparent 45%),
  linear-gradient(180deg, #f7d9c8 0%, #d98b79 100%);
  font-family: sans-serif;
}

#phone-scene {
  display: flex; flex-direction: column; align-items: center; gap: 0;
  transition: opacity 0.8s, transform 0.8s;
}
#phone-scene.out { opacity: 0; transform: scale(0.9); pointer-events: none; }

.bear-wrap {
  position: relative;
  width: 460px;
  max-width: 96vw;
  cursor: grab;
}
.bear-wrap:active { cursor: grabbing; }

.bear-wrap img {
  width: 100%; display: block;
  pointer-events: none; user-select: none;
}

/* SVG sits ON TOP of the photo — draws the spinning dial */
#dial-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  overflow: visible;
  pointer-events: none;
}

.pip-bar {
  background: rgba(255, 255, 255, 0.28);
  backdrop-filter: blur(8px);
  width: 460px;
  max-width: 96vw;
  padding: 10px 0 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  border-radius: 14px;
  box-shadow: 0 8px 24px rgba(90, 30, 20, 0.15);
}
.pip-label {
  font-size: 10px; letter-spacing: 0.2em;
  color: rgba(255,255,255,0.7); font-family: sans-serif; text-transform: uppercase;
}
.pips { display: flex; gap: 10px; }
.pip {
  width: 11px; height: 11px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.5); background: transparent;
  transition: background 0.3s, transform 0.2s;
}
.pip.lit { background: #fff; transform: scale(1.3); }

/* ── LETTER ── */
#letter-scene {
  display: none; opacity: 0;
  position: fixed; inset: 0;
  align-items: center; justify-content: center;
  background: rgba(8,0,0,0.97);
  padding: 24px 16px;
  transition: opacity 1s;
  z-index: 100;
}
#letter-scene.visible { display: flex; }
#letter-scene.in { opacity: 1; }

.paper {
  width: min(500px, 92vw);
  background: #fdf8f0; border-radius: 3px;
  padding: 48px 52px 56px; position: relative;
  box-shadow: 0 2px 0 #ede0cc, 0 4px 0 #ddd0bb,
    0 28px 70px rgba(0,0,0,0.6), 0 8px 20px rgba(0,0,0,0.3);
  transform: translateY(20px);
  transition: transform 0.9s cubic-bezier(.22,.68,0,1.2);
  background-image: repeating-linear-gradient(transparent 0px, transparent 31px, rgba(160,130,90,0.12) 31px, rgba(160,130,90,0.12) 32px);
}
#letter-scene.in .paper { transform: translateY(0); }
.paper::after {
  content: ''; position: absolute; top: 0; bottom: 0; left: 46px;
  width: 1px; background: rgba(230,160,140,0.2); pointer-events: none;
}
.sal {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: 20px; color: #3a2010; margin-bottom: 18px;
  opacity: 0; transition: opacity 0.8s 0.5s;
}
#letter-scene.in .sal { opacity: 1; }
.body-text {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: 16px; line-height: 2rem; color: #3a2010;
  min-height: 100px; word-break: break-word;
}
.cursor {
  display: inline-block; width: 1.5px; height: 1em;
  background: #3a2010; vertical-align: text-bottom;
  animation: blink .85s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.sig {
  margin-top: 28px; font-family: 'Playfair Display', serif;
  font-style: italic; font-size: 16px; color: #c0392b;
  text-align: right; opacity: 0; transition: opacity 1.4s;
}
.sig.show { opacity: 1; }
.wax {
  position: absolute; bottom: -18px; right: 40px;
  width: 44px; height: 44px;
  background: radial-gradient(circle at 38% 32%, #e74c3c, #7b1c12);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; box-shadow: 0 4px 12px rgba(120,20,10,0.45);
  opacity: 0; transform: scale(0.3) rotate(-25deg);
  transition: opacity 0.6s, transform 0.6s cubic-bezier(.34,1.56,.64,1);
}
.wax.show { opacity: 1; transform: scale(1) rotate(0deg); }
.again-btn {
  margin-top: 24px; background: transparent;
  border: 1px solid #c0392b; color: #c0392b;
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: 15px; padding: 8px 30px; border-radius: 2px;
  cursor: pointer; opacity: 0;
  transition: opacity 1.4s, background 0.2s, color 0.2s;
  display: block; margin-left: auto;
}
.again-btn.show { opacity: 1; }
.again-btn:hover { background: #c0392b; color: #fdf8f0; }
</style>
</head>
<body>

<div id="phone-scene">
  <div class="bear-wrap" id="bearWrap">

    <img id="bearImg" src="TeddyBearRotary.png" alt="Teddy bear with rotary phone">

    <!--
      SVG overlay: draws the spinning dial face ON TOP of the photo dial.
      The dial in TeddyBearRotary.png is centred at ~48% left, ~62% top.
      The SVG viewBox matches the image aspect so % coords line up.
    -->
    <svg id="dial-overlay" viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="dialFaceG" cx="36%" cy="30%" r="62%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="55%" stop-color="#f0e8e0"/>
          <stop offset="100%" stop-color="#d8cec8"/>
        </radialGradient>
        <radialGradient id="bumpG" cx="35%" cy="30%" r="65%">
          <stop offset="0%" stop-color="#9b2020"/>
          <stop offset="100%" stop-color="#5a0e0e"/>
        </radialGradient>
        <radialGradient id="heartG" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#ff6b6b"/>
          <stop offset="100%" stop-color="#c0392b"/>
        </radialGradient>
      </defs>

      <!--
        Dial centre: cx=48, cy=62 (in 0-100 viewBox units = 48%, 62% of image)
        Outer ring radius: ~19 units  (~19% of image width)
      -->

      <!-- Static: outer dark ring (matches photo) -->
      <circle cx="50" cy="70" r="17" fill="#7b1c12" stroke="#5a0e0e" stroke-width="0.3"/>

      <!-- SPINNING GROUP — rotates around dial centre -->
      <g id="spinGroup">
        <!-- dial face -->
        <circle cx="50" cy="70" r="15.5" fill="url(#dialFaceG)" stroke="rgba(0,0,0,0.08)" stroke-width="0.2"/>
        <!-- center hub -->
        <circle cx="50" cy="70" r="4.5" fill="#ede5dc" stroke="rgba(0,0,0,0.06)" stroke-width="0.2"/>
        <!-- holes + numbers (built by JS) -->
        <g id="holesG"></g>
        <!-- heart -->
        <g transform="translate(50,70)">
          <path d="M0,-2.2 C-0.5,-3.3 -2.6,-3.3 -2.6,-1.5 C-2.6,0 0,2.2 0,2.2 C0,2.2 2.6,0 2.6,-1.5 C2.6,-3.3 0.5,-3.3 0,-2.2 Z"
            fill="url(#heartG)"/>
        </g>
        <!-- stopper tab -->
        <rect x="63" y="67.8" width="3" height="2" rx="0.6" fill="#922b21" opacity="0.9"/>
        <rect x="65.2" y="66.5" width="1" height="4.5" rx="0.5" fill="#6b1e18"/>
      </g>

      <!-- Invisible hit area -->
      <circle id="hitArea" cx="50" cy="70" r="20" fill="transparent"/>
    </svg>
  </div>

  <div class="pip-bar">
    <div class="pip-label">Dialing</div>
    <div class="pips" id="pips"></div>
  </div>
</div>

<!-- LETTER -->
<div id="letter-scene">
  <div>
    <div class="paper">
      <div class="sal">"Hello, Edris here</div>
      <div class="body-text" id="bodyText"><span class="cursor"></span></div>
      <div class="sig" id="sig">—Craving ube because all I want is u bae ;)</div>
      <div class="wax" id="waxSeal">❧</div>
    </div>
    <button class="again-btn" id="againBtn" onclick="restart()">Begin again</button>
  </div>
</div>

<script>
// ── DIAL POSITION  ──
const DIAL_FX = 0.50;   // centre X as fraction of image width
const DIAL_FY = 0.70;   // centre Y as fraction of image height
const DIAL_FR = 0.17;   // radius as fraction of image width
const TURNS_NEEDED = 5;

// Dial centre in SVG viewBox (0-100) coords
const DCX = 50, DCY = 70;

const LETTER = `You're probably wondering how I got here.

It all started when I couldn't sleep, so here I am at 1 AM doing this.

Don't have a girlfriend, so the best I can do is a crush.

But honestly, it turned out pretty cute lol.`;

const NUMBERS = ['1','2','3','4','5','6','7','8','9','0'];
let cumul=0, rot=0, turns=0, dragging=false, lastAngle=null, done=false;

const bearWrap = document.getElementById('bearWrap');
const img      = document.getElementById('bearImg');
const spinGroup= document.getElementById('spinGroup');
const holesG   = document.getElementById('holesG');
const pipsWrap = document.getElementById('pips');

// Build pips
for (let i=0;i<TURNS_NEEDED;i++){
  const d=document.createElement('div'); d.className='pip'; d.id='pip'+i;
  pipsWrap.appendChild(d);
}

// Build holes + numbers in SVG viewBox units
// Dial centre at (50,70), hole orbit radius ~11 units
for (let i=0;i<10;i++){
  const deg = -55 - i*28;
  const rad = deg*Math.PI/180;
  const r=11, hx=DCX+r*Math.cos(rad), hy=DCY+r*Math.sin(rad);

  const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx',hx); c.setAttribute('cy',hy); c.setAttribute('r','2.5');
  c.setAttribute('fill','#7b1c12'); c.setAttribute('stroke','#5a0e0e'); c.setAttribute('stroke-width','0.15');
  holesG.appendChild(c);

  const inn=document.createElementNS('http://www.w3.org/2000/svg','circle');
  inn.setAttribute('cx',hx); inn.setAttribute('cy',hy); inn.setAttribute('r','1.5');
  inn.setAttribute('fill','#3a0a06');
  holesG.appendChild(inn);

  const nr=13.8, nx=DCX+nr*Math.cos(rad), ny=DCY+nr*Math.sin(rad);
  const t=document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x',nx); t.setAttribute('y',ny+0.9);
  t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','2.6');
  t.setAttribute('font-weight','700'); t.setAttribute('fill','#3a2010');
  t.setAttribute('style','user-select:none;font-family:sans-serif;');
  t.textContent=NUMBERS[i];
  holesG.appendChild(t);
}

function getDialCenter(){
  const r=img.getBoundingClientRect();
  return { x:r.left+r.width*DIAL_FX, y:r.top+r.height*DIAL_FY };
}

function getAngle(e){
  const c=getDialCenter();
  const px=e.touches?e.touches[0].clientX:e.clientX;
  const py=e.touches?e.touches[0].clientY:e.clientY;
  return Math.atan2(py-c.y, px-c.x)*180/Math.PI;
}

function setTurns(n){
  for(let i=0;i<TURNS_NEEDED;i++)
    document.getElementById('pip'+i).classList.toggle('lit',i<n);
}

function onStart(e){
  if(done) return;
  dragging=true; lastAngle=getAngle(e);
  bearWrap.style.cursor='grabbing'; e.preventDefault();
}
function onMove(e){
  if(!dragging||done) return; e.preventDefault();
  const a=getAngle(e); let d=a-lastAngle;
  if(d>180) d-=360; if(d<-180) d+=360; lastAngle=a;
  if(d>0){
    rot+=d; cumul+=d;
    spinGroup.setAttribute('transform',`rotate(${rot},${DCX},${DCY})`);
    const t=Math.floor(cumul/360);
    if(t>turns){turns=t;setTurns(turns);if(turns>=TURNS_NEEDED&&!done){done=true;openLetter();}}
  }
}
function onEnd(){ dragging=false; bearWrap.style.cursor='grab'; }

bearWrap.addEventListener('mousedown',  onStart);
window.addEventListener('mousemove',    onMove);
window.addEventListener('mouseup',      onEnd);
bearWrap.addEventListener('touchstart', onStart, {passive:false});
window.addEventListener('touchmove',    onMove,  {passive:false});
window.addEventListener('touchend',     onEnd);

function openLetter(){
  document.getElementById('phone-scene').classList.add('out');
  const scene=document.getElementById('letter-scene');
  setTimeout(()=>{
    scene.classList.add('visible');
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      scene.classList.add('in'); setTimeout(typewriter,700);
    }));
  },800);
}

function typewriter(){
  const el=document.getElementById('bodyText'); let i=0;
  function tick(){
    if(i<LETTER.length){
      const ch=LETTER[i++];
      el.innerHTML=LETTER.slice(0,i).replace(/\n/g,'<br>')+'<span class="cursor"></span>';
      setTimeout(tick,ch==='\n'?230:'.!?,'.includes(ch)?110:28);
    } else {
      el.innerHTML=LETTER.replace(/\n/g,'<br>');
      setTimeout(()=>{
        document.getElementById('sig').classList.add('show');
        document.getElementById('waxSeal').classList.add('show');
        document.getElementById('againBtn').classList.add('show');
      },900);
    }
  }
  tick();
}

function restart(){
  cumul=0;rot=0;turns=0;done=false;
  spinGroup.setAttribute('transform','');
  setTurns(0);
  const scene=document.getElementById('letter-scene');
  scene.classList.remove('in');
  setTimeout(()=>scene.classList.remove('visible'),900);
  ['sig','waxSeal','againBtn'].forEach(id=>document.getElementById(id).classList.remove('show'));
  document.getElementById('bodyText').innerHTML='<span class="cursor"></span>';
  setTimeout(()=>document.getElementById('phone-scene').classList.remove('out'),400);
}
</script>
</body>
</html>
